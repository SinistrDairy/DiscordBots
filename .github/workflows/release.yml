name: Release Discord Bots

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "genie-bot/**"
      - "triviabot/**"
      - "opie-bot/**"

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      genie-changed: ${{ steps.filter.outputs['genie-bot'] }}
      trivia-changed: ${{ steps.filter.outputs['triviabot'] }}
      opie-changed: ${{ steps.filter.outputs['opie-bot'] }}
    steps:
      - name: Checkout for filtering
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            genie-bot:
              - 'genie-bot/**'
            triviabot:
              - 'triviabot/**'
            opie-bot:
              - 'opie-bot/**'

  release:
    needs: filter
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - bot: genie-bot
            tagPrefix: Gv
            botName: Genie
            changed: ${{ needs.filter.outputs.genie-changed }}
          - bot: triviabot
            tagPrefix: Tv
            botName: Russell
            changed: ${{ needs.filter.outputs.trivia-changed }}
          - bot: opie-bot
            tagPrefix: Ov
            botName: Opie
            changed: ${{ needs.filter.outputs.opie-changed }}

    steps:
      - name: Check if should skip
        id: should_skip
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" && "${{ matrix.changed }}" != "true" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if unchanged on push
        if: ${{ steps.should_skip.outputs.skip == 'true' }}
        run: echo "No changes in ${{ matrix.bot }}, skipping release."

      - name: Checkout code
        if: ${{ steps.should_skip.outputs.skip == 'false' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: ${{ steps.should_skip.outputs.skip == 'false' }}
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: ${{ steps.should_skip.outputs.skip == 'false' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: '${{ matrix.bot }}/pnpm-lock.yaml'

      - name: Install dependencies
        if: ${{ steps.should_skip.outputs.skip == 'false' }}
        run: |
          cd ${{ matrix.bot }}
          pnpm install --frozen-lockfile

      - name: Run release-it
        if: ${{ steps.should_skip.outputs.skip == 'false' }}
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ matrix.bot }}
          pnpm exec release-it --ci --increment patch --tag-prefix=${{ matrix.tagPrefix }}
          echo "RELEASE_VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Post release to Discord
        if: ${{ steps.should_skip.outputs.skip == 'false' && env.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ steps.release.outputs.RELEASE_VERSION }}
          BOT_NAME: ${{ matrix.botName }}
        run: |
          cd ${{ matrix.bot }}
          
          # Extract changelog safely
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(awk 'BEGIN{p=0} /^## /{if(p++)exit} {if(p)print}' CHANGELOG.md)
          else
            CHANGELOG="No changelog available"
          fi
          
          # Build and send Discord payload
          PAYLOAD=$(jq -Rn \
            --arg name "$BOT_NAME" \
            --arg ver "$RELEASE_VERSION" \
            --arg changelog "$CHANGELOG" \
            '{content: ("# " + $name + "\n### Version: `" + $ver + "`\n\n### Features & Fixes\n\n" + $changelog)}')
          
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Discord notification failed, but release succeeded"